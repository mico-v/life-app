name: Android CI / Release

on:
  push:
    branches:
      - main
      - android_dev
    tags:
      - 'v*'
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── CI: build debug APK on android_dev branch ─────────────────────────────
  ci:
    if: github.ref == 'refs/heads/android_dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Release: build signed release APK on main branch or version tag ───────
  release:
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
          ls -lah app/release.jks

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER_PATH="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n1)"
          "$APKSIGNER_PATH" verify --print-certs "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=nightly-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
